<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("conn-color-mode")==="light"){document.documentElement.classList.add("light-mode");}}());</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conn — All Links at One Place</title>
  <meta name="description" content="All my links in one place. Connect with me across the web.">
  <meta name="keywords" content="link in bio, social links, all links at one place, creator portfolio, connect with me, linktree alternative">
  <meta name="robots" content="index, follow">

  <!-- Canonical URL (updated dynamically by JS for /u/:username pages) -->
  <link rel="canonical" href="https://conn-delta.vercel.app/" id="canonicalTag">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="profile">
  <meta property="og:url" content="https://conn-delta.vercel.app/" id="ogUrl">
  <meta property="og:title" content="Conn — All Links at One Place" id="ogTitle">
  <meta property="og:description" content="All my links in one place. Connect with me across the web." id="ogDesc">
  <meta property="og:image" content="https://conn-delta.vercel.app/assets/og-home.jpg" id="ogImage">
  <meta property="og:site_name" content="Conn">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Conn — All Links at One Place" id="twTitle">
  <meta name="twitter:description" content="All my links in one place. Connect with me across the web." id="twDesc">
  <meta name="twitter:image" content="https://conn-delta.vercel.app/assets/og-home.jpg" id="twImage">

  <!-- JSON-LD: dynamically injected per-user by app.js -->

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/themes.css">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <link rel="stylesheet" href="css/light-mode.css">
</head>
<body class="theme-midnight">
  
  <!-- scroll progress -->
  <div id="scroll-progress"></div>

  <!-- Background Effects -->
   <div class="theme-toggle-floating"><button class="theme-toggle-btn" aria-label="Switch to light mode" title="Switch to light mode"><span class="toggle-track"><span class="toggle-icon toggle-icon-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span><span class="toggle-icon toggle-icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span><span class="toggle-thumb"></span></span></button></div>
  <div class="bg-gradient"></div>
  <div class="bg-noise"></div>
  <div class="floating-orb orb-1"></div>
  <div class="floating-orb orb-2"></div>
  <div class="floating-orb orb-3"></div>
  <canvas class="bg-canvas" id="particleCanvas"></canvas>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Profile -->
    <section class="profile-section" id="profileSection">
      <div class="avatar-wrapper">
        <div class="avatar-glow"></div>
        <div class="avatar" id="avatarEl">
          <div class="avatar-placeholder" id="avatarPlaceholder">C</div>
        </div>
      </div>
      <h1 class="profile-name" id="profileName">Loading...</h1>
      <p class="profile-bio" id="profileBio"></p>
      <div class="verified-badge" id="verifiedBadge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>Verified</span>
      </div>
    </section>

    <!-- Socials -->
    <nav class="socials-row" id="socialsRow"></nav>

    <!-- Links -->
    <div class="links-container" id="linksContainer">
      <!-- Links populated via JS -->
    </div>

    <!-- Conn Branding Badge (fixed bottom-right) -->
    <a href="/" class="conn-badge" id="connBadge" title="Made with Conn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span>Conn<span class="conn-badge-dot">.</span></span>
    </a>
  </main>

  <script src="/js/app.js"></script>
  <script src="js/theme-toggle.js"></script>
</body>
</html>
